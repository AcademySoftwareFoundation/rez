name: mypy
on:
  pull_request:
    paths:
      - 'src/rez/**.py'
      - 'src/rezplugins/**.py'
      - 'pyproject.toml'
      - '!src/rez/utils/_version.py'
      - '!src/rez/data/**'
      - '!src/rez/vendor/**'
      - '!src/rez/backport/**'
  push:
    paths:
      - 'src/rez/**.py'
      - 'src/rezplugins/**.py'
      - 'pyproject.toml'
      - '!src/rez/utils/_version.py'
      - '!src/rez/data/**'
      - '!src/rez/vendor/**'
      - '!src/rez/backport/**'

permissions:
  contents: read

jobs:
  mypy:
    name: Run mypy static type analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install mypy==1.14.1 mypy_baseline==0.7.1 types-setuptools

      - name: Run mypy
        run: >-
          set -e
          echo "To update the baseline run:"
          echo 'mypy | mypy-baseline sync --ignore-categories note syntax --ignore ".* is not subscriptable.*"'
          echo "then commit mypy-baseline.txt"
          echo
          mypy | mypy-baseline filter --ignore-categories=note --allow-unsynced
