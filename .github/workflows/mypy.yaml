name: mypy
on:
  pull_request:
    paths:
      - 'src/rez/**.py'
      - 'src/rezplugins/**.py'
      - 'pyproject.toml'
      - '!src/rez/utils/_version.py'
      - '!src/rez/data/**'
      - '!src/rez/vendor/**'
      - '!src/rez/backport/**'
  push:
    paths:
      - 'src/rez/**.py'
      - 'src/rezplugins/**.py'
      - 'pyproject.toml'
      - '!src/rez/utils/_version.py'
      - '!src/rez/data/**'
      - '!src/rez/vendor/**'
      - '!src/rez/backport/**'

permissions:
  contents: read

jobs:
  mypy:
    name: Run mypy static type analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install mypy==1.14.1 mypy_baseline==0.7.1 types-setuptools

      - name: Run mypy
        run: >-
          set -e
          echo "To update the baseline run:"
          echo 'mypy | mypy-baseline sync --ignore-categories note syntax --ignore ".* is not subscriptable.*"'
          echo "then commit mypy-baseline.txt"
          echo
          mypy | mypy-baseline filter --ignore-categories=note --allow-unsynced
