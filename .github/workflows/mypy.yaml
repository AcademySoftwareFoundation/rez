name: mypy
on:
  pull_request:
    paths:
      - 'src/rez/**.py'
      - 'src/rezplugins/**.py'
      - 'pyproject.toml'
      - '!src/rez/utils/_version.py'
      - '!src/rez/data/**'
      - '!src/rez/vendor/**'
      - '!src/rez/backport/**'
  push:
    paths:
      - 'src/rez/**.py'
      - 'src/rezplugins/**.py'
      - 'pyproject.toml'
      - '!src/rez/utils/_version.py'
      - '!src/rez/data/**'
      - '!src/rez/vendor/**'
      - '!src/rez/backport/**'

permissions:
  contents: read

jobs:
  mypy:
    name: Run mypy static type analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.1.0
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install mypy==1.14.1 mypy_baseline==0.7.1 types-setuptools

      - name: Run mypy
        run: >-
          set -e
          echo "To update the baseline run:"
          echo 'mypy | mypy-baseline sync --ignore-categories note syntax --ignore ".* is not subscriptable.*"'
          echo "then commit mypy-baseline.txt"
          echo
          mypy | mypy-baseline filter --ignore-categories=note --allow-unsynced
